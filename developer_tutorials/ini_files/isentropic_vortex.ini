[run]
tEnd=10.0
nStepmax=-1
output_timeslice=0.1

initial_conditions=isentropic_vortex

[dt]
hydro_cfl=0.8

[amr]
level_min=4
level_max=6

bx=4
by=4

markers_kernel=RefineCondition_pseudo_gradient
epsilon_refine=0.01
epsilon_coarsen=0.001

load_balancing_frequency=-1
cycle_frequency=5
remap=MapUserData_linear

[mesh]
ndim=2

xmin=0.0
xmax=10.0

ymin=-5.0
ymax= 5.0

boundary_type_xmin=periodic
boundary_type_xmax=periodic

boundary_type_ymin=periodic
boundary_type_ymax=periodic

[hydro]
gamma0=1.66666667
riemann=hllc
update=HydroUpdate_RK2

[isentropic_vortex]
u0=1.0
v0=1.0
beta=5.0
x0=5.0
y0=0.0

[output]
outputDir=./
outputPrefix=isentropic_vortex
write_variables=rho,rho_vx,rho_vy,e_tot,level
